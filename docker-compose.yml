# docker-compose.yml base — servicios sin GPU.
# Usar junto con docker-compose.gpu.yml para incluir llm + embed con GPU passthrough:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

x-common-env: &common-env
  APUESTAS_ENV: ${APUESTAS_ENV:-local}
  APUESTAS_LOG_LEVEL: ${APUESTAS_LOG_LEVEL:-INFO}
  APUESTAS_TZ: ${APUESTAS_TZ:-America/Mexico_City}
  PYTHON_GIL: ${PYTHON_GIL:-0}
  REGION_PREFERENCE: ${REGION_PREFERENCE:-BOTH}
  DATABASE_URL: ${DATABASE_URL}
  VALKEY_URL: ${VALKEY_URL}
  TASKIQ_BROKER_URL: ${TASKIQ_BROKER_URL}
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
  MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  PREFECT_API_URL: ${PREFECT_API_URL}
  LLAMA_SERVER_URL: ${LLAMA_SERVER_URL:-http://llm:8080}
  TEI_URL: ${TEI_URL:-http://embed:80}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://signoz-otel:4317}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-apuestas}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 5s
  retries: 8
  start_period: 30s

x-python-build: &python-build
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      PYTHON_VERSION: "3.13"
  image: apuestas/python:local
  volumes:
    - ./src:/app/src:rw
    - ./migrations:/app/migrations:rw
    - ./config:/app/config:ro
    - ./prompts:/app/prompts:ro
    - ./scripts:/app/scripts:ro
    - ./alembic.ini:/app/alembic.ini:ro

services:
  # ────── Datos ────────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: apuestas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /home/postgres/pgdata/data
      TS_TUNE_MEMORY: 2GB
      TS_TUNE_NUM_CPUS: "10"
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - effective_cache_size=2GB
      - -c
      - max_connections=40
      - -c
      - shared_preload_libraries=timescaledb,pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - synchronous_commit=on
      - -c
      - wal_compression=on
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      <<: *healthcheck-defaults
    networks:
      - apuestas_net
    mem_limit: 2560m
    shm_size: 256m

  valkey:
    image: valkey/valkey:8-alpine
    container_name: apuestas-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --requirepass
      - ${VALKEY_PASSWORD}
      - --maxmemory
      - 400mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "--pass", "${VALKEY_PASSWORD}", "ping"]
      <<: *healthcheck-defaults
    networks:
      - apuestas_net
    mem_limit: 512m

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: apuestas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001" # consola solo localhost
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      <<: *healthcheck-defaults
    networks:
      - apuestas_net
    mem_limit: 400m

  minio-setup:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: apuestas-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET_ARTIFACTS};
        mc mb --ignore-existing local/${MINIO_BUCKET_PARQUET};
        mc mb --ignore-existing local/${MINIO_BUCKET_SCRAPES};
        mc anonymous set download local/${MINIO_BUCKET_ARTIFACTS};
        echo 'MinIO buckets ready.';
      "
    restart: "no"
    networks:
      - apuestas_net

  # ────── MLflow ───────────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: apuestas-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_ARTIFACTS_DESTINATION: s3://${MINIO_BUCKET_ARTIFACTS}
    command: >-
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MINIO_BUCKET_ARTIFACTS}
      --serve-artifacts
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      <<: *healthcheck-defaults
    networks:
      - apuestas_net
    mem_limit: 500m

  # ────── Prefect 3 ────────────────────────────────────────────────────────

  prefect:
    image: prefecthq/prefect:3-latest
    container_name: apuestas-prefect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://prefect:4200/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PREFECT_UI_API_URL: http://localhost:4200/api
    command: prefect server start --host 0.0.0.0
    ports:
      - "127.0.0.1:4200:4200"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:4200/api/health\", timeout=3).raise_for_status()' || exit 1"]
      <<: *healthcheck-defaults
    networks:
      - apuestas_net
    mem_limit: 700m

  # ────── Aplicación Python ────────────────────────────────────────────────

  api:
    <<: *python-build
    container_name: apuestas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      prefect:
        condition: service_healthy
    environment:
      <<: *common-env
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    command: granian --interface asgi --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-2} --access-log apuestas.api.main:app
    ports:
      - "${API_HOST_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      <<: *healthcheck-defaults
    networks:
      - apuestas_net
    mem_limit: 600m

  worker-ingest:
    <<: *python-build
    container_name: apuestas-worker-ingest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      WORKER_KIND: ingest
    command: taskiq worker apuestas.tasks.broker:broker apuestas.tasks.ingest --workers 2 --max-async-tasks 8
    networks:
      - apuestas_net
    mem_limit: 800m

  worker-ml:
    <<: *python-build
    container_name: apuestas-worker-ml
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      WORKER_KIND: ml
    command: taskiq worker apuestas.tasks.broker:broker apuestas.tasks.ml --workers 1 --max-async-tasks 4
    networks:
      - apuestas_net
    mem_limit: 1200m

  worker-scrape:
    <<: *python-build
    container_name: apuestas-worker-scrape
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      WORKER_KIND: scrape
    command: taskiq worker apuestas.tasks.broker:broker apuestas.tasks.scrape --workers 1 --max-async-tasks 2
    networks:
      - apuestas_net
    mem_limit: 900m

  telegram:
    <<: *python-build
    container_name: apuestas-telegram
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    command: python -m apuestas.bot.telegram
    networks:
      - apuestas_net
    mem_limit: 250m

  grafana:
    image: grafana/grafana-oss:11.4.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - apuestas_net
    mem_limit: 350m

volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  minio_data:
    driver: local
  grafana_data:
    driver: local

networks:
  apuestas_net:
    driver: bridge
    name: apuestas_net
