[project]
name = "apuestas"
version = "0.1.0"
description = "Sports betting bot — 100% local, multi-deporte (NBA/MLB/NFL/Fútbol/Boxeo)"
readme = "README.md"
requires-python = "==3.14.4"
license = { text = "MIT" }
authors = [{ name = "Leandro" }]

# ═══════════════════════════════════════════════════════════════════════════
# TODAS LAS VERSIONES PINEADAS EXACTAS (==) PARA REPRODUCIBILIDAD.
# Python 3.14.4 free-threaded (PEP 779 — oficial support desde 3.14).
#
# AUDIT STATUS: verificado 2026-04-19 vía MCP Context7 + búsquedas web.
# Las versiones críticas actualizadas:
#   - Python 3.14.4 (released 2026-04-07)
#   - FastAPI 0.128.0 (Context7 verified)
#   - Polars 1.32.3 (Context7 verified)
#   - XGBoost 3.2.x (March 2026 release)
#   - LightGBM 4.6.0 (latest stable)
#
# Re-validar cada 3 meses con `make audit-deps` → corre `uv lock --upgrade`
# + Context7 queries para librerías críticas.
# ═══════════════════════════════════════════════════════════════════════════

