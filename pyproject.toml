[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/apuestas"]

[tool.uv]
package = true
dev-dependencies = []
# Fuerza uso de Python 3.14.4t (free-threaded) si está disponible.
# uv auto-detecta `python3.14t`; si no, cae a `python3.14` (con GIL).
python-preference = "only-managed"
python-downloads = "automatic"

[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = ["migrations/versions", "notebooks"]

[tool.ruff.lint]
select = [
    "E", "F", "W", "I", "N", "UP", "B", "A", "C4", "DTZ", "T20",
    "SIM", "RET", "ARG", "PTH", "PL", "RUF", "ASYNC", "S",
]
ignore = [
    "PLR0913", # too-many-arguments
    "PLR2004", # magic-value
    "PLR0911", # too-many-return-statements
    "PLR0912", # too-many-branches
    "PLR0915", # too-many-statements
    "S101",    # assert (ok in tests)
    "N815",    # mixed-case (external APIs)
    "N803",    # argument names (matrices X, DF)
    "N806",    # non-lowercase in function (X, Y, DF linear algebra convention)
    "T201",    # print (ok in scripts/notebooks)
    "PLC0415", # import-outside-top-level (lazy imports intencionales)
    "RUF001",  # ambiguous unicode in strings (× símbolos matemáticos deliberados)
    "RUF002",  # ambiguous unicode in docstrings (9 capas × 2 equipos)
    "RUF003",  # ambiguous unicode in comments
    "RUF012",  # mutable-class-default (Textual widgets patrón BINDINGS)
    "S110",    # try-except-pass (best-effort code en cache/observability)
    "S108",    # hardcoded-temp (tests/scripts)
    "RET504",  # unnecessary-assign (claridad sobre perf)
    "ARG001",  # unused-function-argument (abstract methods, callbacks)
    "ARG002",  # unused-method-argument
    "E501",    # line-too-long (URLs, prompts multi-línea)
    "SIM108",  # if-else vs ternary (legibilidad prima)
    "SIM105",  # contextlib.suppress (try/except/pass más explícito)
    "SIM117",  # multiple-with-statements (anidado con context managers)
    "PLW0603", # global-statement (singleton settings)
    "PLW0108", # unnecessary-lambda (clarity in tests)
    "PLW1510", # subprocess-run-without-check (intencional)
    "PLR1714", # repeated-equality-comparison
    "F841",    # unused-variable (en closures capturadas)
    "RUF005",  # collection-literal-concatenation
    "RUF015",  # unnecessary-iterable-allocation
    "RUF059",  # unused-unpacked-variable (tuple destructuring parcial)
    "B007",    # unused-loop-control-variable
    "B018",    # useless-expression (en tests de import)
    "B024",    # abstract-base-class-without-abstract-method
    "E402",    # module-import-not-at-top (sys.path hacks en scripts)
    "E731",    # lambda-assignment
    "E741",    # ambiguous-variable-name (i, l, j en algoritmos)
    "PTH111",  # os-path-expanduser (compatibility)
    "PTH123",  # builtin-open (compatibility con libs externas)
    "S311",    # non-cryptographic-random (jitter de retry)
    "S314",    # xml-element-tree (RSS parsing confiable)
    "S607",    # partial-path (scripts de setup)
    "S112",    # try-except-continue
    "ASYNC109", # async-function-with-timeout
    "S608",    # sql-injection (false positives: params bindeados)
    "S603",    # subprocess-without-shell (ya con args list, seguro)
    "RUF006",  # asyncio-dangling-task (fire-and-forget intencional)
    "PLW2901", # redefined-loop-name (refinamiento en loop)
    "A001",    # builtin-shadowing (id local)
    "ARG005",  # unused-lambda-argument (placeholders)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "PLR", "ARG", "PLC0415", "RUF", "F841", "E501", "N806", "B018"]
"scripts/**/*.py" = ["T201", "S", "PLC0415"]
"src/apuestas/tui/**/*.py" = ["RUF012"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
strict = true
warn_return_any = false  # Libs externas (nba_api, atproto, etc.) devuelven Any
warn_unused_configs = false
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = false
disable_error_code = ["misc", "attr-defined", "no-any-return", "has-type", "override", "assignment", "no-untyped-call", "unused-ignore", "name-defined"]
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["nba_api.*", "pybaseball.*", "nflreadpy.*", "penaltyblog.*", "shin.*", "tabpfn.*", "statsapi.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "apuestas.ingest.*",
    "apuestas.tui.*",
    "apuestas.ml.*",
    "apuestas.flows.*",
    "apuestas.betting.*",
    "apuestas.llm.*",
    "apuestas.features.*",
    "apuestas.monitors.*",
    "apuestas.api.*",
    "apuestas.tasks.*",
]
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--cov=apuestas",
    "--cov-report=term-missing",
    "--cov-report=html:reports/coverage",
]
markers = [
    "slow: slow tests (>5s)",
    "integration: integration tests requiring Docker",
    "e2e: end-to-end tests",
    "gpu: tests requiring CUDA GPU",
    "free_threading: tests sensibles a thread-safety (free-threaded build)",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:google.*",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.coverage.run]
source = ["src/apuestas"]
omit = ["*/migrations/*", "*/tests/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
