    "asyncpg==0.30.1",
    "sqlalchemy[asyncio]==2.0.45",
    "alembic==1.14.1",
    "psycopg[binary,pool]==3.2.9",
    "redis[hiredis]==5.3.1",
    # ── Configuración / serialización ─────────────────────────────────────
    "pydantic==2.12.3",
    "pydantic-settings==2.8.2",
    "msgspec==0.19.0",
    "python-dotenv==1.0.1",
    "orjson==3.11.2",
    "pyyaml==6.0.2",
    "types-pyyaml==6.0.12.20250122",
    # ── Task queue / orquestación ─────────────────────────────────────────
