# Selectores CSS/XPath para scraping Caliente.mx.
# Mantener aquí para ajustar sin tocar código (cuando cambie el DOM).

version: 1
last_verified: "2026-04-19"

# Páginas base
urls:
  home: "https://www.caliente.mx/apuestas"
  liga_mx: "https://www.caliente.mx/apuestas/futbol/mexico/liga-mx"
  liga_expansion: "https://www.caliente.mx/apuestas/futbol/mexico/liga-expansion-mx"
  nba: "https://www.caliente.mx/apuestas/basquetbol/nba"
  mlb: "https://www.caliente.mx/apuestas/beisbol/mlb"
  nfl: "https://www.caliente.mx/apuestas/futbol-americano/nfl"
  boxing: "https://www.caliente.mx/apuestas/boxeo"

# Esperas requeridas antes de scrapear (cloudflare challenge)
waits:
  initial_delay_seconds: [3, 7]  # random range
  after_scroll: 1.5
  between_events: [1, 3]

# Selectores principales (CSS)
selectors:
  event_card: "div[data-testid='event-card'], .event-row, .sport-event"
  event_title: "h3, .event-title, [data-testid='event-name']"
  team_home: ".team-home, [data-home-team='true']"
  team_away: ".team-away, [data-away-team='true']"
  start_time: "time[datetime], .event-time, [data-testid='event-time']"
  market_section: "section[data-market], .market-group"
  market_name: ".market-title, [data-testid='market-name']"
  outcome_button: "button[data-outcome], .odds-button"
  outcome_label: ".outcome-label, [data-testid='outcome-name']"
  outcome_odds: ".odds-value, [data-testid='odds-decimal']"
  outcome_line: "[data-handicap], .handicap"
  next_page: "a[aria-label='Siguiente'], button.load-more"
  captcha_indicator: "#challenge-form, iframe[src*='cloudflare']"

# Detección de ban / captcha
ban_signals:
  - "Checking your browser before accessing"
  - "Attention Required! | Cloudflare"
  - "cf-challenge-running"
  - "Access denied"
  - "Error 1020"
