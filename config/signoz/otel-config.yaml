# SigNoz OTel Collector config — recibe traces/metrics/logs del bot via OTLP.
# Exporta a ClickHouse de SigNoz.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape Prometheus del endpoint FastAPI /metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'apuestas-api'
          scrape_interval: 30s
          static_configs:
            - targets: ['api:8000']
          metrics_path: /metrics

processors:
  batch:
    timeout: 10s
    send_batch_size: 10000
    send_batch_max_size: 11000

  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 20

  resource:
    attributes:
      - key: deployment.environment
        value: "local"
        action: upsert

  # Filtrar métricas ruidosas (granian access logs)
  filter/noisy:
    metrics:
      exclude:
        match_type: strict
        metric_names:
          - http_server_duration_seconds_bucket

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:${env:CLICKHOUSE_PASSWORD}@signoz-clickhouse:9000
    ttl: 168h  # 7 días
    logs_table_name: signoz_logs
    traces_table_name: signoz_traces
    metrics_table_name: signoz_metrics

  # Export opcional a Prometheus local (retro-compat Grafana)
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    metric_expiration: 5m

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, filter/noisy, batch, resource]
      exporters: [clickhouse, prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [clickhouse]
