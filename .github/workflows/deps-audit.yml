name: Dependencies audit

on:
  schedule:
    - cron: '0 5 * * 1'  # lunes 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit-and-upgrade:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.5.18
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.14.4

      - name: Generar reporte upgrades disponibles
        id: upgrades
        run: |
          uv lock --upgrade --dry-run 2>&1 | tee upgrade-report.txt
          if grep -qE "Would upgrade|would be upgraded" upgrade-report.txt; then
            echo "upgrades_available=true" >> $GITHUB_OUTPUT
          else
            echo "upgrades_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Ejecutar upgrade real
        if: steps.upgrades.outputs.upgrades_available == 'true'
        run: uv lock --upgrade

      - name: pip-audit tras upgrade
        continue-on-error: true
        id: audit
        run: uv run --extra ml --extra llm --extra scraping --extra dev pip-audit --desc

      - name: Licenses check
        run: uv run --extra dev pip-licenses --format=markdown --output-file=LICENSES.md

      - name: Crear PR con upgrades
        if: steps.upgrades.outputs.upgrades_available == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): weekly automated upgrade"
          title: "chore(deps): weekly automated upgrade — $(date +%F)"
          body: |
            Weekly automated dependency upgrade PR.

            ## Upgrades

            ```
            $(cat upgrade-report.txt)
            ```

            ## pip-audit result

            ${{ steps.audit.outcome }}

            Revisar Actions → pip-audit para detalles.

            Merge tras validar que CI verde.
          branch: deps/auto-upgrade-${{ github.run_id }}
          base: develop
          labels: dependencies,automated
          draft: false

      - name: Crear issue si pip-audit encontró vulnerabilidades críticas
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security: pip-audit vulnerabilities detected (${new Date().toISOString().split('T')[0]})`,
              body: `El audit semanal detectó vulnerabilidades. Revisar el workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'automated', 'high-priority'],
            })
