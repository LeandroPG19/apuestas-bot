name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # lunes 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # para subir SARIF a code scanning

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════ Trivy filesystem + image scan ═══════════════
  trivy-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image para scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: apuestas:security-scan

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: apuestas:security-scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ═══════════════════════ Gitleaks secrets scan ═══════════════════════
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════ pip-audit Python deps ═══════════════════════
  pip-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.5.18
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.14.4

      - name: Install deps
        run: uv sync --extra ml --extra llm --extra scraping --extra bot --extra monitoring --extra dev --frozen

      - name: pip-audit
        run: uv run pip-audit --desc --strict

  # ═══════════════════════ Semgrep SAST ════════════════════════════════
  semgrep:
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep OWASP + Python + FastAPI rules
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/fastapi \
            --config=p/owasp-top-ten \
            --config=p/sqlalchemy \
            --config=p/secrets \
            --sarif --output=semgrep.sarif \
            --error

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ═══════════════════════ CodeQL análisis Python ══════════════════════
  codeql:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3
