name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site (markdown → HTML via mkdocs-material)
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-include-markdown-plugin pymdown-extensions

          mkdir -p site_src
          cp README.md site_src/index.md
          cp CHANGELOG.md site_src/changelog.md
          cp CONTRIBUTING.md site_src/contributing.md
          cp CODE_OF_CONDUCT.md site_src/code_of_conduct.md
          cp -r docs/* site_src/ 2>/dev/null || true

          cat > mkdocs.yml <<'EOF'
          site_name: apuestas-bot
          site_description: Multi-sport value betting detector — 100% local
          site_url: https://leandropg19.github.io/apuestas-bot/
          repo_url: https://github.com/LeandroPG19/apuestas-bot
          repo_name: LeandroPG19/apuestas-bot
          docs_dir: site_src
          theme:
            name: material
            palette:
              - scheme: default
                primary: indigo
                accent: deep purple
                toggle:
                  icon: material/brightness-7
                  name: Switch to dark mode
              - scheme: slate
                primary: indigo
                accent: deep purple
                toggle:
                  icon: material/brightness-4
                  name: Switch to light mode
            features:
              - navigation.tabs
              - navigation.top
              - navigation.expand
              - search.suggest
              - search.highlight
              - content.code.copy
              - content.code.annotate
            icon:
              repo: fontawesome/brands/github
          markdown_extensions:
            - admonition
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.tabbed:
                alternate_style: true
            - pymdownx.highlight:
                anchor_linenums: true
            - tables
            - toc:
                permalink: true
          plugins:
            - search
          EOF

          mkdocs build --strict || mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
