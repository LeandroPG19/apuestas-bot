name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  PYTHON_VERSION: "3.14.4"
  UV_VERSION: "0.5.18"
  UV_SYSTEM_PYTHON: "0"
  PYTHON_GIL: "0"  # free-threading

jobs:
  # ═══════════════════════ Lint + format ═══════════════════════════════
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps (dev only)
        run: uv sync --extra dev --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

  # ═══════════════════════ Type checking ═══════════════════════════════
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install full deps (all extras necesarios para stubs)
        run: uv sync --extra ml --extra llm --extra scraping --extra dev --frozen

      - name: mypy strict
        run: uv run mypy src

  # ═══════════════════════ Unit tests matrix ═══════════════════════════
  unit-tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gil: ["0", "1"]  # Test en free-threaded y con GIL
    env:
      PYTHON_GIL: ${{ matrix.gil }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --extra ml --extra llm --extra scraping --extra bot --extra monitoring --extra dev --frozen

      - name: Unit tests
        env:
          POSTGRES_PASSWORD: test
          VALKEY_PASSWORD: test
        run: uv run pytest tests/unit -x -v --tb=short --cov=apuestas --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.gil == '0'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════ Integration tests ═══════════════════════════
  integration-tests:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: apuestas
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: apuestas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apuestas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: apuestas
      POSTGRES_PASSWORD: test-password
      POSTGRES_DB: apuestas
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql+asyncpg://apuestas:test-password@localhost:5432/apuestas
      VALKEY_PASSWORD: ""
      VALKEY_URL: redis://localhost:6379/0
      TASKIQ_BROKER_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --extra ml --extra llm --extra scraping --extra bot --extra dev --frozen

      - name: Crear extensions PG
        run: |
          PGPASSWORD=test-password psql -h localhost -U apuestas -d apuestas -c "
            CREATE EXTENSION IF NOT EXISTS timescaledb;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS btree_gin;
            CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
          "

      - name: Alembic migrations
        run: uv run alembic upgrade head

      - name: Integration tests
        run: uv run pytest tests/integration -x -v --tb=short -m integration

  # ═══════════════════════ Docker build ════════════════════════════════
  docker-build:
    runs-on: ubuntu-24.04
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.gpu.yml config --quiet

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: apuestas:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}
