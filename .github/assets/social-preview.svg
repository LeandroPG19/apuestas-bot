<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.08">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative chart line (representing model calibration) -->
  <polyline
    points="80,520 200,480 320,440 440,400 560,350 680,310 800,270 920,220 1040,180 1160,150"
    stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)"/>
  <g fill="#22d3ee" opacity="0.8">
    <circle cx="200" cy="480" r="4"/>
    <circle cx="440" cy="400" r="4"/>
    <circle cx="680" cy="310" r="4"/>
    <circle cx="920" cy="220" r="4"/>
    <circle cx="1160" cy="150" r="4"/>
  </g>

  <!-- Title -->
  <text x="80" y="200" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-2">
    apuestas-bot
  </text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="32" font-weight="500" fill="url(#accent)" letter-spacing="-0.5">
    Multi-sport value betting detector — 100% local
  </text>

  <!-- Description -->
  <text x="80" y="330" font-family="'SF Mono', Menlo, monospace" font-size="22" fill="#cbd5e1">
    Detects +EV alerts over de-vigged Pinnacle / Polymarket / Kalshi odds
  </text>

  <!-- Stack chips -->
  <g font-family="'SF Mono', Menlo, monospace" font-size="18" font-weight="600">
    <rect x="80" y="380" width="120" height="38" rx="19" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="140" y="406" fill="#60a5fa" text-anchor="middle">Python 3.14</text>

    <rect x="216" y="380" width="100" height="38" rx="19" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="266" y="406" fill="#34d399" text-anchor="middle">FastAPI</text>

    <rect x="332" y="380" width="130" height="38" rx="19" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="397" y="406" fill="#a78bfa" text-anchor="middle">PostgreSQL 16</text>

    <rect x="478" y="380" width="110" height="38" rx="19" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="533" y="406" fill="#fbbf24" text-anchor="middle">LightGBM</text>

    <rect x="604" y="380" width="100" height="38" rx="19" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="654" y="406" fill="#f87171" text-anchor="middle">XGBoost</text>

    <rect x="720" y="380" width="120" height="38" rx="19" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="780" y="406" fill="#22d3ee" text-anchor="middle">Telegram Bot</text>
  </g>

  <!-- Sports list -->
  <text x="80" y="490" font-family="'SF Pro Display', -apple-system, sans-serif"
        font-size="26" font-weight="600" fill="#e2e8f0">
    NBA · MLB · NFL · Fútbol · Tenis · NHL · Boxeo
  </text>

  <!-- Footer -->
  <text x="80" y="570" font-family="'SF Mono', Menlo, monospace" font-size="20" fill="#94a3b8">
    github.com/LeandroPG19/apuestas-bot
  </text>

  <!-- License chip -->
  <rect x="1080" y="552" width="120" height="36" rx="6" fill="#fde047" opacity="0.95"/>
  <text x="1140" y="576" font-family="'SF Mono', Menlo, monospace" font-size="18" font-weight="700"
        fill="#1e293b" text-anchor="middle">MIT License</text>

  <!-- Decorative accent corner -->
  <g opacity="0.4">
    <circle cx="1180" cy="80" r="60" fill="url(#accent)" filter="url(#glow)"/>
    <text x="1180" y="92" font-family="sans-serif" font-size="48" font-weight="900"
          fill="#ffffff" text-anchor="middle">+EV</text>
  </g>
</svg>
